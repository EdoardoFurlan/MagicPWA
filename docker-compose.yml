services:
  reverse-proxy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    user: "1000:1000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - /home/pi/certs:/etc/caddy/certs
    depends_on:
      - frontend
      - backend

  backend:
    build: ./backend
    environment:
      - SECRET_KEY=${BACKEND_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    container_name: receipt-backend
    restart: always
    user: "1000:1000"
    volumes:
      - ./data:/app/data         # Salva i dati fuori dal container per non perderli
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/receipts.db
      - TAILSCALE_IP=100.80.129.104 # Opzionale per sicurezza extra

  frontend:
    build: ./frontend
    container_name: receipt-frontend
    restart: always
    depends_on:
      - backend

# --- QUESTA È LA PARTE CHE MANCAVA ---
volumes:
  caddy_data:

  caddy_config:




