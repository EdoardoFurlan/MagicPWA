services:
  reverse-proxy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    user: "1000:1000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  backend:
    build: ./backend
    container_name: receipt-backend
    restart: always
    user: "1000:1000"
    volumes:
      - ./data:/app/data         # Salva i dati fuori dal container per non perderli
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/receipts.db
      - TAILSCALE_IP=100.80.129.104 # Opzionale per sicurezza extra

  frontend:
    build: ./frontend
    container_name: receipt-frontend
    restart: always
    depends_on:
      - backend